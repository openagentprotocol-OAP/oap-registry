name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install ajv
        run: npm install --no-save ajv@8 ajv-formats@3
      - name: Validate listings against schema
        run: |
          node <<'NODE'
          const Ajv2020 = require('ajv/dist/2020').default;
          const addFormats = require('ajv-formats').default;
          const fs = require('fs');
          const path = require('path');
          const ajv = new Ajv2020({ allErrors: true, strict: false });
          addFormats(ajv);
          const implSchema = JSON.parse(fs.readFileSync('schemas/implementation.schema.json', 'utf-8'));
          const revSchema = JSON.parse(fs.readFileSync('schemas/revocation.schema.json', 'utf-8'));
          const validators = {
            implementations: ajv.compile(implSchema),
            'peer-witnesses': ajv.compile(implSchema),
            revocations: ajv.compile(revSchema),
          };
          let failed = 0;
          for (const dir of Object.keys(validators)) {
            if (!fs.existsSync(dir)) continue;
            const validate = validators[dir];
            for (const f of fs.readdirSync(dir).filter(x => x.endsWith('.json'))) {
              const data = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf-8'));
              if (!validate(data)) {
                failed++;
                console.error(`FAIL ${dir}/${f}:`, JSON.stringify(validate.errors, null, 2));
              } else {
                console.log(`OK   ${dir}/${f}`);
              }
            }
          }
          if (failed) process.exit(1);
          NODE

  receipts:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Verify Receipt fetchability, hash match, validity window
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');
          const dir = 'implementations';
          if (!fs.existsSync(dir)) process.exit(0);
          let failed = 0;
          (async () => {
            for (const f of fs.readdirSync(dir).filter(x => x.endsWith('.json'))) {
              const listing = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf-8'));
              try {
                const res = await fetch(listing.conformance_receipt_uri, { signal: AbortSignal.timeout(10000) });
                if (!res.ok) { console.error(`FAIL receipt-fetch ${f}: HTTP ${res.status}`); failed++; continue; }
                const body = Buffer.from(await res.arrayBuffer());
                const hash = crypto.createHash('sha256').update(body).digest('hex');
                if (hash !== listing.conformance_receipt_sha256) {
                  console.error(`FAIL receipt-hash ${f}: expected ${listing.conformance_receipt_sha256} got ${hash}`); failed++; continue;
                }
                const receipt = JSON.parse(body.toString('utf-8'));
                const expires = receipt.validity && receipt.validity.not_after;
                if (!expires || new Date(expires) < new Date()) {
                  console.error(`FAIL receipt-expiry ${f}`); failed++; continue;
                }
                if ((receipt.signatures || []).some(s => /^(PLACEHOLDER_NOT_FOR_PRODUCTION|unsigned-reference|placeholder:)/.test(s.value))) {
                  console.error(`FAIL placeholder-signature ${f}`); failed++; continue;
                }
                console.log(`OK   ${f}: receipt valid until ${expires}`);
              } catch (e) {
                console.error(`FAIL ${f}: ${e.message}`); failed++;
              }
            }
            if (failed) process.exit(1);
          })();
          NODE

  signature-verify:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Verify every Receipt signature against the signer's DID Document
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('node:crypto');
          const dir = 'implementations';
          if (!fs.existsSync(dir)) process.exit(0);

          // RFC 8037 Ed25519 raw 32-byte public key in JWK -> Node KeyObject.
          const ED25519_PREFIX = Buffer.from('302a300506032b6570032100', 'hex');
          function jwkToKey(jwk) {
            if (!jwk || jwk.kty !== 'OKP' || jwk.crv !== 'Ed25519' || !jwk.x) return null;
            const raw = Buffer.from(jwk.x, 'base64url');
            if (raw.length !== 32) return null;
            const der = Buffer.concat([ED25519_PREFIX, raw]);
            return crypto.createPublicKey({ key: der, format: 'der', type: 'spki' });
          }

          // Canonicalisation matches reference attest.js: drop signatures, then
          // recursively serialise with sorted object keys at every depth.
          function canonicalize(obj) {
            if (obj === null || typeof obj !== 'object') return JSON.stringify(obj);
            if (Array.isArray(obj)) return '[' + obj.map(canonicalize).join(',') + ']';
            const keys = Object.keys(obj).sort();
            return '{' + keys.map((k) => JSON.stringify(k) + ':' + canonicalize(obj[k])).join(',') + '}';
          }
          function canonical(receipt) {
            const { signatures, ...rest } = receipt;
            return canonicalize(rest);
          }

          async function resolveDid(did) {
            if (!did.startsWith('did:web:')) return null;
            let host = did.slice('did:web:'.length).split(':').join('/');
            host = decodeURIComponent(host);
            const url = `https://${host}/.well-known/did.json`;
            const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
            if (!r.ok) throw new Error(`did.json HTTP ${r.status}`);
            return r.json();
          }

          (async () => {
            let failed = 0;
            for (const f of fs.readdirSync(dir).filter(x => x.endsWith('.json'))) {
              const listing = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf-8'));
              try {
                const r = await fetch(listing.conformance_receipt_uri, { signal: AbortSignal.timeout(10000) });
                if (!r.ok) throw new Error(`receipt HTTP ${r.status}`);
                const receipt = await r.json();
                const sigs = Array.isArray(receipt.signatures) ? receipt.signatures : [];
                if (sigs.length === 0) { console.error(`FAIL ${f}: no signatures on Receipt`); failed++; continue; }
                const didDoc = await resolveDid(listing.tool_did);
                if (!didDoc) { console.error(`FAIL ${f}: DID method not did:web; cannot verify`); failed++; continue; }
                const vmIndex = new Map();
                for (const vm of (didDoc.verificationMethod || [])) vmIndex.set(vm.id, vm);
                const allMethods = (didDoc.verificationMethod || []);
                const message = Buffer.from(canonical(receipt), 'utf-8');
                let verified = false;
                let verifiedBy = null;
                for (const sig of sigs) {
                  const sigBytes = Buffer.from(sig.value, 'base64url');
                  // Strict path: signer reference matches a published verification method.
                  const named = vmIndex.get(sig.by);
                  const tried = [];
                  if (named) tried.push(named);
                  // Tolerant path: try every published Ed25519 key. RFC 0019 requires
                  // the signature to verify against material the controller publishes;
                  // it does not mandate that sig.by match the verificationMethod id
                  // exactly (some signers use a stable kid such as #key-1 even when
                  // the DID document publishes the same key under #oap-signing).
                  for (const vm of allMethods) if (vm !== named) tried.push(vm);
                  for (const vm of tried) {
                    const key = jwkToKey(vm.publicKeyJwk);
                    if (!key) continue;
                    if (crypto.verify(null, message, key, sigBytes)) {
                      verified = true; verifiedBy = vm.id; break;
                    }
                  }
                  if (verified) break;
                }
                if (!verified) { console.error(`FAIL ${f}: no signature verified against any verificationMethod in ${listing.tool_did} DID Document`); failed++; continue; }
                console.log(`OK   ${f}: signature verified against ${verifiedBy}`);
              } catch (e) {
                console.error(`FAIL ${f}: ${e.message}`); failed++;
              }
            }
            if (failed) process.exit(1);
          })();
          NODE

  peer-witnesses:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Verify L4/L5 peer-witness counts, currency, and (L5) controller independence
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const dir = 'implementations';
          if (!fs.existsSync(dir)) process.exit(0);

          // Index local registry: did -> {level, expiresAt}
          const localIndex = new Map();
          const files = fs.readdirSync(dir).filter(x => x.endsWith('.json'));
          for (const f of files) {
            const l = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf-8'));
            localIndex.set(l.tool_did, { level: l.conformance_level, expiresAt: l.expires_at });
          }

          function controllerKey(did) {
            if (!did) return '';
            const parts = did.split(':');
            if (parts.length < 3) return did;
            if (parts[1] === 'web') return parts[2];
            return `${parts[0]}:${parts[1]}`;
          }
          async function isWitnessL4PlusLive(witness) {
            const local = localIndex.get(witness.witness_did);
            if (local && /^L[45]/.test(local.level || '') && local.expiresAt && new Date(local.expiresAt) > new Date()) return true;
            try {
              const r = await fetch(witness.witness_receipt_uri, { signal: AbortSignal.timeout(10000) });
              if (!r.ok) return false;
              const wr = await r.json();
              const claims = wr.claimed_levels || (wr.conformance_level ? [wr.conformance_level] : []);
              const exp = wr.validity && wr.validity.not_after;
              return claims.some(l => ['L4','L5'].includes(l)) && exp && new Date(exp) > new Date();
            } catch { return false; }
          }

          (async () => {
            let failed = 0;
            for (const f of files) {
              const l = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf-8'));
              const level = l.conformance_level || '';
              const wantsL4 = level === 'L4' || level === 'L5';
              if (!wantsL4) { console.log(`OK   ${f}: not L4 or L5; peer-witness checks skipped`); continue; }
              try {
                const r = await fetch(l.conformance_receipt_uri, { signal: AbortSignal.timeout(10000) });
                const receipt = await r.json();
                const w = Array.isArray(receipt.peer_witnesses) ? receipt.peer_witnesses : [];
                const minRequired = level === 'L5' ? 3 : 1;
                if (w.length < minRequired) { console.error(`FAIL ${f}: needs >=${minRequired} peer witnesses, found ${w.length}`); failed++; continue; }
                let badWitness = false;
                for (const wit of w) {
                  const ok = await isWitnessL4PlusLive(wit);
                  if (!ok) { console.error(`FAIL ${f}: witness ${wit.witness_did} is not a current L4+ implementation`); badWitness = true; break; }
                }
                if (badWitness) { failed++; continue; }
                if (level === 'L5') {
                  const dids = new Set(w.map(x => x.witness_did));
                  const ctls = new Set(w.map(x => controllerKey(x.witness_did)));
                  if (dids.size < 3 || ctls.size < 3) {
                    console.error(`FAIL ${f}: L5 requires >=3 distinct witness DIDs AND >=3 distinct controllers; got dids=${dids.size}, controllers=${ctls.size}`); failed++; continue;
                  }
                }
                console.log(`OK   ${f}: ${w.length} peer-witness signature(s) verified for ${level}`);
              } catch (e) {
                console.error(`FAIL ${f}: ${e.message}`); failed++;
              }
            }
            if (failed) process.exit(1);
          })();
          NODE

  l5-external-audit:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Verify L5 listings carry an unexpired external_audit attestation
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const dir = 'implementations';
          if (!fs.existsSync(dir)) process.exit(0);
          const ALLOWED = new Set(['SOC2-Type-II','ISO-27001','ISO-42001','equivalent']);
          (async () => {
            let failed = 0;
            for (const f of fs.readdirSync(dir).filter(x => x.endsWith('.json'))) {
              const l = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf-8'));
              if (l.conformance_level !== 'L5') { continue; }
              try {
                const r = await fetch(l.conformance_receipt_uri, { signal: AbortSignal.timeout(10000) });
                const receipt = await r.json();
                const a = receipt.external_audit;
                if (!a || typeof a !== 'object') { console.error(`FAIL ${f}: L5 missing receipt.external_audit`); failed++; continue; }
                if (!ALLOWED.has(a.framework)) { console.error(`FAIL ${f}: framework ${a.framework} not in allowed set`); failed++; continue; }
                if (!a.auditor_did || !a.auditor_did.startsWith('did:')) { console.error(`FAIL ${f}: auditor_did missing or not a DID`); failed++; continue; }
                const exp = a.valid_until ? Date.parse(a.valid_until) : NaN;
                if (Number.isNaN(exp) || exp < Date.now()) { console.error(`FAIL ${f}: external audit expired or invalid valid_until`); failed++; continue; }
                console.log(`OK   ${f}: L5 external audit ${a.framework} valid until ${a.valid_until}`);
              } catch (e) {
                console.error(`FAIL ${f}: ${e.message}`); failed++;
              }
            }
            if (failed) process.exit(1);
          })();
          NODE

  revocations:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Verify revocation signatures and reject listings whose Receipt has been revoked
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('node:crypto');
          if (!fs.existsSync('revocations')) { console.log('No revocations/ directory; nothing to check.'); process.exit(0); }

          // Same canonicaliser used by reference attest.js and the
          // signature-verify job. Recursive, sorted keys at every depth.
          function canonicalize(obj) {
            if (obj === null || typeof obj !== 'object') return JSON.stringify(obj);
            if (Array.isArray(obj)) return '[' + obj.map(canonicalize).join(',') + ']';
            const keys = Object.keys(obj).sort();
            return '{' + keys.map((k) => JSON.stringify(k) + ':' + canonicalize(obj[k])).join(',') + '}';
          }
          function canonicalRevocation(r) {
            const { signature, peer_witness_signatures, ...rest } = r;
            return canonicalize(rest);
          }

          // Ed25519 raw 32-byte JWK -> Node KeyObject.
          const ED25519_PREFIX = Buffer.from('302a300506032b6570032100', 'hex');
          function jwkToKey(jwk) {
            if (!jwk || jwk.kty !== 'OKP' || jwk.crv !== 'Ed25519' || !jwk.x) return null;
            const raw = Buffer.from(jwk.x, 'base64url');
            if (raw.length !== 32) return null;
            return crypto.createPublicKey({ key: Buffer.concat([ED25519_PREFIX, raw]), format: 'der', type: 'spki' });
          }

          async function fetchDidDoc(did) {
            if (!did.startsWith('did:web:')) return null;
            const host = decodeURIComponent(did.slice('did:web:'.length).split(':').join('/'));
            const r = await fetch(`https://${host}/.well-known/did.json`, { signal: AbortSignal.timeout(10000) });
            if (!r.ok) return null;
            return r.json();
          }

          async function verifyAgainstDid(message, sigBytes, did) {
            const doc = await fetchDidDoc(did);
            if (!doc) return false;
            for (const vm of (doc.verificationMethod || [])) {
              const key = jwkToKey(vm.publicKeyJwk);
              if (!key) continue;
              if (crypto.verify(null, message, key, sigBytes)) return true;
            }
            return false;
          }

          function controllerKey(did) {
            if (!did) return '';
            const parts = did.split(':');
            if (parts.length < 3) return did;
            if (parts[1] === 'web') return parts[2];
            return `${parts[0]}:${parts[1]}`;
          }

          // Index live implementations by their conformance_receipt_sha256.
          const implByHash = new Map();
          if (fs.existsSync('implementations')) {
            for (const f of fs.readdirSync('implementations').filter(x => x.endsWith('.json'))) {
              const l = JSON.parse(fs.readFileSync(path.join('implementations', f), 'utf-8'));
              implByHash.set(l.conformance_receipt_sha256, { file: f, listing: l });
            }
          }

          // Index local L4+ implementations for forced-revocation peer-witness lookup.
          const liveL4Plus = new Map();
          if (fs.existsSync('implementations')) {
            for (const f of fs.readdirSync('implementations').filter(x => x.endsWith('.json'))) {
              const l = JSON.parse(fs.readFileSync(path.join('implementations', f), 'utf-8'));
              if (/^L[45]/.test(l.conformance_level || '') && l.expires_at && new Date(l.expires_at) > new Date()) {
                liveL4Plus.set(l.tool_did, l);
              }
            }
          }

          (async () => {
            let failed = 0;
            const revokedHashes = new Map();

            for (const f of fs.readdirSync('revocations').filter(x => x.endsWith('.json'))) {
              const rev = JSON.parse(fs.readFileSync(path.join('revocations', f), 'utf-8'));
              const message = Buffer.from(canonicalRevocation(rev), 'utf-8');

              // Path A: self-revocation. The signature MUST verify against the
              // revoked_by_did's DID Document. By RFC 0026 Section 5 the
              // revoked_by_did MUST equal the listing's tool_did for the
              // self-revocation path; verifying against that DID enforces both.
              const sigBytes = Buffer.from(rev.signature.value, 'base64url');
              const selfOk = await verifyAgainstDid(message, sigBytes, rev.revoked_by_did);

              // Path B: forced (Quorum) revocation by three or more peer
              // witnesses, none from the same controller.
              let quorumOk = false;
              const pw = Array.isArray(rev.peer_witness_signatures) ? rev.peer_witness_signatures : [];
              if (pw.length >= 3) {
                const dids = new Set(pw.map(x => x.witness_did));
                const ctls = new Set(pw.map(x => controllerKey(x.witness_did)));
                if (dids.size >= 3 && ctls.size >= 3) {
                  let verified = 0;
                  for (const w of pw) {
                    if (!liveL4Plus.has(w.witness_did)) continue;
                    const wsig = Buffer.from(w.value, 'base64url');
                    if (await verifyAgainstDid(message, wsig, w.witness_did)) verified++;
                  }
                  quorumOk = verified >= 3;
                }
              }

              if (!selfOk && !quorumOk) {
                console.error(`FAIL revocations/${f}: signature does not verify against ${rev.revoked_by_did}, and forced-revocation Quorum (>=3 independent live L4+ peer witnesses) was not met`);
                failed++;
                continue;
              }

              const filenameOk = f.startsWith(`${rev.slug}-`) && f.endsWith('.json');
              if (!filenameOk) {
                console.error(`FAIL revocations/${f}: filename must be <slug>-<receipt-hash>.json`);
                failed++;
                continue;
              }

              const revokedAt = Date.parse(rev.revoked_at);
              if (Number.isNaN(revokedAt)) { console.error(`FAIL revocations/${f}: revoked_at is not a parseable date-time`); failed++; continue; }

              if (revokedAt <= Date.now()) {
                revokedHashes.set(rev.revoked_receipt_sha256, { file: f, rev });
              }
              console.log(`OK   revocations/${f}: ${rev.reason} via ${selfOk ? 'self-signature' : 'Quorum'} (effective ${rev.revoked_at})`);
            }

            // Reject any active listing whose Receipt is revoked.
            for (const [hash, { file, rev }] of revokedHashes) {
              const impl = implByHash.get(hash);
              if (impl) {
                console.error(`FAIL implementations/${impl.file}: this listing\'s Receipt (sha256=${hash}) was revoked by revocations/${file} at ${rev.revoked_at}. Re-run attest.js, publish a new Receipt at a new URL, and update this listing.`);
                failed++;
              }
            }

            if (failed) process.exit(1);
            console.log(`Revocation evaluator: ${revokedHashes.size} effective revocation(s) processed, no active listing affected.`);
          })();
          NODE

  manifest:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - name: Verify Manifest reachability and DID match
        run: |
          set -e
          if [ ! -d implementations ]; then exit 0; fi
          for f in implementations/*.json; do
            uri=$(jq -r .manifest_uri "$f")
            did=$(jq -r .tool_did "$f")
            echo "Checking $f -> $uri"
            body=$(curl -fsSL --max-time 10 "$uri")
            mdid=$(echo "$body" | jq -r '.tool.did')
            if [ "$mdid" != "$did" ]; then
              echo "FAIL: manifest tool.did=$mdid does not match listing tool_did=$did"; exit 1
            fi
          done

  did-resolution:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - name: Verify did:web resolves to a DID Document
        run: |
          set -e
          if [ ! -d implementations ]; then exit 0; fi
          for f in implementations/*.json; do
            did=$(jq -r .tool_did "$f")
            case "$did" in
              did:web:*)
                host=${did#did:web:}
                host=$(echo "$host" | tr ':' '/')
                url="https://$host/.well-known/did.json"
                echo "Resolving $did -> $url"
                curl -fsSL --max-time 10 "$url" | jq '.id' >/dev/null
                ;;
              *) echo "Skip non-did:web $did" ;;
            esac
          done

  sybil-filter:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - name: 30-day domain-age sybil filter (whois)
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y whois jq >/dev/null
          if [ ! -d implementations ]; then exit 0; fi
          for f in implementations/*.json; do
            provisional=$(jq -r '.provisional // false' "$f")
            if [ "$provisional" = "true" ]; then echo "Skip $f (provisional)"; continue; fi
            did=$(jq -r .tool_did "$f")
            case "$did" in
              did:web:*)
                host=${did#did:web:}
                host=${host%%:*}
                root=$(echo "$host" | awk -F. '{print $(NF-1)"."$NF}')
                created=$(whois "$root" 2>/dev/null | grep -iE "Creation Date|created:" | head -1 | sed -E 's/.*: *//; s/ .*//')
                if [ -z "$created" ]; then echo "WARN: cannot determine creation date for $root, allowing"; continue; fi
                created_ts=$(date -d "$created" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$created" +%s 2>/dev/null || echo 0)
                now_ts=$(date +%s)
                age_days=$(( (now_ts - created_ts) / 86400 ))
                if [ "$age_days" -lt 30 ]; then
                  echo "FAIL: $root is $age_days days old, sybil filter requires >=30. Set provisional: true to bypass during the 30-day waiting period."
                  exit 1
                fi
                echo "OK $root age=$age_days days"
                ;;
              *) echo "Skip non-did:web $did" ;;
            esac
          done

  append-only:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Reject deletes or modifications of pre-existing files outside own slug
        run: |
          set -e
          base=$(git merge-base origin/${{ github.base_ref }} HEAD)
          changed=$(git diff --name-status "$base" HEAD)
          echo "$changed"
          # Allow: A (added). M of own slug under implementations/. D never.
          deletes=$(echo "$changed" | awk '$1=="D"')
          if [ -n "$deletes" ]; then
            echo "FAIL: Pull Request deletes files. Registry is append-only."
            echo "$deletes"
            exit 1
          fi
